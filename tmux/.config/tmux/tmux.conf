unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

set -g prefix C-s

set -g mouse on

set-window-option -g mode-keys vi

bind C-l send-keys 'C-l'
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
bind c new-window -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

### configure Tmux Plugin Manager
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.config/tmux/modules'

if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

set -g @plugin 'tmux-plugins/tpm'

# basic plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# theme / style
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'alexwforsythe/tmux-which-key'  # prefix + space
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'

# tooling
set -g @plugin 'omerxx/tmux-floax'             # prefix + f
set -g @plugin 'wfxr/tmux-fzf-url'             # prefix + u
set -g @plugin 'fcsonline/tmux-thumbs'         # prefix + t

### configure plugins

### https://github.com/christoomey/vim-tmux-navigator
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding
set -g @vim_navigator_prefix_mapping_clear_screen ""

### https://github.com/joshmedeski/sesh
bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ' \
    --header $'⚡ C-a all  │ 🪟 C-t tmux │ ⚙️ C-g configs │ 📁 C-z zoxide\n🔎 C-f find │ ❌ C-x kill  │ 🖱️ C-d/u scroll' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-d:preview-half-page-down,ctrl-u:preview-half-page-up' \
    --bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟 )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️ )+reload(sesh list -c --icons)' \
    --bind 'ctrl-z:change-prompt(📁 )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎 )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-x:execute(tmux kill-session -t {2..})+change-prompt(⚡ )+reload(sesh list --icons)' \
    --preview-window 'right:60%:follow' \
    --preview 'sesh preview {2..}'
)\""
bind-key Tab run-shell "sesh last"

### https://github.com/omerxx/tmux-floax
set -g @floax-bind 'f'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#f5a97f'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

### https://github.com/wfxr/tmux-fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

### https://github.com/fcsonline/tmux-thumbs
set -g @thumbs-key 'T'
set -g @thumbs-command 'echo -n {} | pbcopy && tmux display-message "Copied to clipboard: {}"'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && tmux paste-buffer && tmux display-message "Pasted: {}"'
set -g @thumbs-position 'off_left'
set -g @thumbs-contrast 1
set -g @thumbs-fg-color '#a6da95'
set -g @thumbs-bg-color '#24273a'
set -g @thumbs-hint-fg-color '#f5a97f'
set -g @thumbs-hint-bg-color '#24273a'
set -g @thumbs-select-fg-color '#8aadf4'
set -g @thumbs-select-bg-color '#24273a'

### https://github.com/catppuccin/tmux
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status 'no'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -gq @catppuccin_window_current_color '#{E:@thm_surface_2}'
set -g @catppuccin_window_text '#[italics]#{window_name}'
set -g @catppuccin_date_time_text ' %d.%m. %H:%M'
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'

# source the plugin here
run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux'

# load custom modules
source -F '#{d:current_file}/custom_modules/ctp_cpu.conf'
source -F '#{d:current_file}/custom_modules/ctp_memory.conf'
source -F '#{d:current_file}/custom_modules/primary_ip.conf'

# set left and right status bar
set -g allow-rename off
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session} '
set -gF status-right '#{E:@catppuccin_status_primary_ip}'
set -agF status-right '#{E:@catppuccin_status_ctp_cpu}'
set -agF status-right '#{E:@catppuccin_status_ctp_memory}'
if 'test -r /sys/class/power_supply/BAT*' {
  set -agF status-right '#{E:@catppuccin_status_battery}'
}
set -ag status-right '#{E:@catppuccin_status_date_time}'

### general config

set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g set-clipboard on          # use system clipboard
set -g default-terminal "${TERM}"
set -g default-command /opt/homebrew/bin/nu  # launch nushell by default
set-hook -g session-created 'if -F "#{==:#{session_name},0}" "rename-session terminal"'

# start index at 1
set -g base-index 1
set -g pane-base-index 1

# renumber when window is closed
set -g renumber-window on

# enable 256-colors
set -ag terminal-overrides ",$TERM:RGB"

# initialize tmux plugin manager and source all plugins
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'

# pane border styling (after TPM so catppuccin colors are available)
set -gF pane-active-border-style "fg=#{@thm_peach}"
set -gF pane-border-style "fg=#{@thm_surface_0}"
