# worktrunk user-level config — see https://github.com/max-sixty/worktrunk
#
# These hooks apply to every repo unless overridden in a per-repo
# .config/wt.toml. Project-specific dev servers, copy includes, etc. live in
# the repo's .config/wt.toml (checked in there, not here).

# Pipe the wt switch picker preview through delta so it picks up our
# Catppuccin theme instead of the default git pager output.
[switch.picker]
pager = "delta --paging=never --width=$COLUMNS"

# Show LLM-generated branch summaries in `wt list --full` and the `wt switch`
# picker's `summary` tab. The summary command is borrowed from
# [commit.generation] below — same LLM serves commit messages and summaries.
# Cached per-branch; re-runs only when the diff changes.
[list]
summary = true

# LLM commit messages — used by wt merge / wt step commit / wt step squash
# AND (via [list] summary = true) by branch summaries in the picker.
# Uses Claude Code with the haiku model: one-shot, no session, no tools,
# no system prompt, no settings inheritance — minimal context for a fast
# generation step.
[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

# Build a dedicated tmux session for every new worktree.
# Layout: 󰊢 git / 󰅩 IDE / 󰚩 AI (3 windows). Idempotent.
[pre-start]
tmux-session = '~/.config/worktrunk/scripts/wt-ensure-session.sh "{{ repo }}" "{{ branch }}" "{{ worktree_path }}"'

# Eliminate cold starts: copy gitignored files (.env, node_modules, IDE state,
# caches…) from the main worktree. APFS reflinks make this near-free on macOS.
# Per-project excludes go in that repo's .config/wt.toml.
[[post-start]]
copy-ignored = "wt step copy-ignored"

# Kill the orphan tmux session when removing the worktree.
[post-remove]
tmux-session = 'tmux kill-session -t "={{ repo }}/WT/{{ branch | sanitize }}" 2>/dev/null || true'
